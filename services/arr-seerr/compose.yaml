services:
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    restart: unless-stopped
    environment:
      - LOG_LEVEL=debug
      - TZ=America/Vancouver
      - PUID=1000
      - PGID=1000
    ports:
      - 5055:5055
    volumes:
      - /docker/seerr/config:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status
        || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
